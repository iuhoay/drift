<%
  # Rails 8.2 reads .env via Rails.application.dotenvs and combines it with
  # ENV + credentials in Rails.app.creds. .env is NOT auto-loaded into ENV,
  # so config files must look up values explicitly.
  creds = Rails.application.creds
%>
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= creds.option(:rails_max_threads, default: 5) %>
  host: <%= creds.option(:database_host, default: "localhost") %>
  port: <%= creds.option(:database_port, default: 5432) %>
  username: <%= creds.option(:database_username, default: ENV["USER"]) %>
  password: <%= creds.option(:database_password) %>

development:
  <<: *default
  database: <%= creds.option(:database_name, default: "drift_development") %>

test:
  <<: *default
  database: <%= creds.option(:test_database_name, default: "drift_test") %>

production:
  primary:
    <<: *default
    database: <%= creds.option(:database_name, default: "drift_production") %>
    username: <%= creds.option(:database_username, default: "drift") %>
  cache:
    <<: *default
    database: <%= creds.option(:database_name, default: "drift_production") %>_cache
    username: <%= creds.option(:database_username, default: "drift") %>
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: <%= creds.option(:database_name, default: "drift_production") %>_queue
    username: <%= creds.option(:database_username, default: "drift") %>
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: <%= creds.option(:database_name, default: "drift_production") %>_cable
    username: <%= creds.option(:database_username, default: "drift") %>
    migrations_paths: db/cable_migrate
